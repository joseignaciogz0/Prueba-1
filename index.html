<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>divirtiendome en la coordinación J&amp;J</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at center, #1a0030 0%, #06000f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 {
      color: #fff;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #cc00ff, 0 0 50px #8800bb;
      letter-spacing: 1px;
      padding: 0 20px;
    }
    .dance-pair {
      animation: lambada 0.65s ease-in-out infinite alternate;
      transform-origin: 300px 380px;
    }
    @keyframes lambada {
      from { transform: rotate(-8deg); }
      to   { transform: rotate(8deg) translateY(-8px); }
    }
    .float-note {
      animation: floatNote 1.2s ease-in-out infinite alternate;
    }
    @keyframes floatNote {
      from { transform: translateY(0); opacity: 0.4; }
      to   { transform: translateY(-25px); opacity: 1; }
    }
    p { color: #9933cc; margin-top: 16px; font-size: 0.85rem; letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1>divirtiendome en la coordinación J&amp;J</h1>

  <svg width="620" height="490" viewBox="0 0 620 490" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="web" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
        <line x1="0"  y1="0"  x2="18" y2="18" stroke="rgba(0,0,0,0.22)" stroke-width="0.7"/>
        <line x1="18" y1="0"  x2="0"  y2="18" stroke="rgba(0,0,0,0.22)" stroke-width="0.7"/>
        <line x1="9"  y1="0"  x2="9"  y2="18" stroke="rgba(0,0,0,0.14)" stroke-width="0.5"/>
        <line x1="0"  y1="9"  x2="18" y2="9"  stroke="rgba(0,0,0,0.14)" stroke-width="0.5"/>
      </pattern>
    </defs>

    <!-- Stage glow -->
    <ellipse cx="310" cy="462" rx="240" ry="20" fill="rgba(180,0,255,0.18)"/>

    <!-- Floating music notes -->
    <text class="float-note" x="55"  y="135" font-size="26" fill="#cc00ff" style="animation-delay:0s">♪</text>
    <text class="float-note" x="530" y="115" font-size="26" fill="#cc00ff" style="animation-delay:0.4s">♫</text>
    <text class="float-note" x="38"  y="220" font-size="20" fill="#aa00dd" style="animation-delay:0.8s">♩</text>
    <text class="float-note" x="558" y="200" font-size="20" fill="#aa00dd" style="animation-delay:0.2s">♬</text>
    <text class="float-note" x="72"  y="330" font-size="16" fill="#880099" style="animation-delay:1s">♪</text>
    <text class="float-note" x="524" y="320" font-size="16" fill="#880099" style="animation-delay:0.6s">♫</text>

    <g class="dance-pair">

      <!-- ===================================== -->
      <!-- SPIDERMAN THERIAN  (centered x=175)  -->
      <!-- ===================================== -->

      <!-- BALLERINA LEGS (drawn first = behind body) -->
      <line x1="162" y1="285" x2="120" y2="398" stroke="#bf9a68" stroke-width="11" stroke-linecap="round"/>
      <ellipse cx="111" cy="407" rx="25" ry="9" fill="#bf9a68" transform="rotate(-30 111 407)"/>
      <line x1="188" y1="285" x2="224" y2="398" stroke="#bf9a68" stroke-width="11" stroke-linecap="round"/>
      <ellipse cx="233" cy="407" rx="25" ry="9" fill="#bf9a68" transform="rotate(30 233 407)"/>

      <!-- TORSO – Spiderman red shirt -->
      <rect x="147" y="192" width="56" height="92" rx="10" fill="#cc0000"/>
      <rect x="147" y="192" width="56" height="92" rx="10" fill="url(#web)"/>
      <text x="175" y="246" text-anchor="middle" font-size="22">🕷</text>

      <!-- NECK -->
      <rect x="168" y="180" width="14" height="16" rx="5" fill="#bf9a68"/>

      <!-- OUTER LEFT ARM – Hulk thick, raised heroically -->
      <line x1="151" y1="210" x2="88"  y2="174" stroke="#bf9a68" stroke-width="31" stroke-linecap="round"/>
      <line x1="88"  y1="174" x2="55"  y2="238" stroke="#bf9a68" stroke-width="26" stroke-linecap="round"/>
      <circle cx="47" cy="254" r="20" fill="#bf9a68"/>

      <!-- INNER RIGHT ARM – extends toward Batman -->
      <line x1="199" y1="210" x2="252" y2="226" stroke="#bf9a68" stroke-width="31" stroke-linecap="round"/>
      <line x1="252" y1="226" x2="295" y2="236" stroke="#bf9a68" stroke-width="26" stroke-linecap="round"/>

      <!-- TUTU -->
      <ellipse cx="175" cy="285" rx="58" ry="16" fill="#ff6ab5"/>
      <ellipse cx="175" cy="283" rx="46" ry="12" fill="#ff45a0"/>

      <!-- HEAD -->
      <!-- Ears outer -->
      <polygon points="138,112 154,64 172,112" fill="#bf9a68"/>
      <polygon points="178,112 196,64 212,112" fill="#bf9a68"/>
      <!-- Ears inner (pink) -->
      <polygon points="142,107 154,73 166,107" fill="#f0a0bc"/>
      <polygon points="184,107 196,73 208,107" fill="#f0a0bc"/>
      <!-- Head -->
      <circle cx="175" cy="140" r="45" fill="#bf9a68"/>
      <!-- Snout -->
      <ellipse cx="175" cy="164" rx="24" ry="17" fill="#d4ac78"/>
      <!-- Nose -->
      <ellipse cx="175" cy="154" rx="10" ry="7" fill="#1a0f0f"/>
      <!-- Mouth smile -->
      <path d="M166,165 Q175,174 184,165" stroke="#1a0f0f" stroke-width="1.5" fill="none"/>
      <!-- Eyes -->
      <circle cx="158" cy="134" r="9"   fill="white"/>
      <circle cx="192" cy="134" r="9"   fill="white"/>
      <circle cx="158" cy="134" r="5.5" fill="#111"/>
      <circle cx="192" cy="134" r="5.5" fill="#111"/>
      <circle cx="160" cy="131" r="2.5" fill="white"/>
      <circle cx="194" cy="131" r="2.5" fill="white"/>

      <!-- ===================================== -->
      <!-- BATMAN THERIAN    (centered x=435)    -->
      <!-- ===================================== -->

      <!-- BALLERINA LEGS -->
      <line x1="420" y1="285" x2="380" y2="398" stroke="#bf9a68" stroke-width="11" stroke-linecap="round"/>
      <ellipse cx="371" cy="407" rx="25" ry="9" fill="#bf9a68" transform="rotate(-30 371 407)"/>
      <line x1="450" y1="285" x2="488" y2="398" stroke="#bf9a68" stroke-width="11" stroke-linecap="round"/>
      <ellipse cx="497" cy="407" rx="25" ry="9" fill="#bf9a68" transform="rotate(30 497 407)"/>

      <!-- TORSO – Batman dark shirt -->
      <rect x="407" y="192" width="56" height="92" rx="10" fill="#16162a"/>
      <text x="435" y="246" text-anchor="middle" font-size="22">🦇</text>

      <!-- NECK -->
      <rect x="428" y="180" width="14" height="16" rx="5" fill="#bf9a68"/>

      <!-- INNER LEFT ARM – extends toward Spiderman -->
      <line x1="411" y1="210" x2="358" y2="226" stroke="#bf9a68" stroke-width="31" stroke-linecap="round"/>
      <line x1="358" y1="226" x2="315" y2="236" stroke="#bf9a68" stroke-width="26" stroke-linecap="round"/>

      <!-- OUTER RIGHT ARM – Hulk thick, raised -->
      <line x1="459" y1="210" x2="522" y2="174" stroke="#bf9a68" stroke-width="31" stroke-linecap="round"/>
      <line x1="522" y1="174" x2="555" y2="238" stroke="#bf9a68" stroke-width="26" stroke-linecap="round"/>
      <circle cx="563" cy="254" r="20" fill="#bf9a68"/>

      <!-- TUTU -->
      <ellipse cx="435" cy="285" rx="58" ry="16" fill="#ff6ab5"/>
      <ellipse cx="435" cy="283" rx="46" ry="12" fill="#ff45a0"/>

      <!-- HEAD -->
      <polygon points="398,112 414,64 432,112" fill="#bf9a68"/>
      <polygon points="438,112 456,64 472,112" fill="#bf9a68"/>
      <polygon points="402,107 414,73 426,107" fill="#f0a0bc"/>
      <polygon points="444,107 456,73 468,107" fill="#f0a0bc"/>
      <circle cx="435" cy="140" r="45" fill="#bf9a68"/>
      <ellipse cx="435" cy="164" rx="24" ry="17" fill="#d4ac78"/>
      <ellipse cx="435" cy="154" rx="10" ry="7" fill="#1a0f0f"/>
      <path d="M426,165 Q435,174 444,165" stroke="#1a0f0f" stroke-width="1.5" fill="none"/>
      <circle cx="418" cy="134" r="9"   fill="white"/>
      <circle cx="452" cy="134" r="9"   fill="white"/>
      <circle cx="418" cy="134" r="5.5" fill="#111"/>
      <circle cx="452" cy="134" r="5.5" fill="#111"/>
      <circle cx="420" cy="131" r="2.5" fill="white"/>
      <circle cx="454" cy="131" r="2.5" fill="white"/>

      <!-- CLASPED HANDS (center) -->
      <ellipse cx="305" cy="237" rx="25" ry="20" fill="#bf9a68"/>
      <line x1="296" y1="232" x2="314" y2="232" stroke="#a07848" stroke-width="1.5"/>
      <line x1="294" y1="237" x2="316" y2="237" stroke="#a07848" stroke-width="1.5"/>
      <line x1="296" y1="242" x2="314" y2="242" stroke="#a07848" stroke-width="1.5"/>

    </g>
  </svg>

  <p>🎵 lambada mode activated 🎵</p>
</body>
</html>
